name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Open MPI and CMake
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            openmpi-bin libopenmpi-dev cmake build-essential

      - name: Configure
        run: cmake -S . -B build -DRING_ALLREDUCE_WARNINGS_AS_ERRORS=ON -DENABLE_SANITIZERS=ON

      - name: Build
        run: cmake --build build -j

      # GitHub-hosted runners execute as root and typically have fewer cores
      # than this project's N=16 test case, so every mpirun invocation this
      # project issues (see tests/CMakeLists.txt) already carries
      # --allow-run-as-root --oversubscribe unconditionally; nothing extra
      # is needed here.
      #
      # detect_leaks=0: this job is the only place ENABLE_SANITIZERS is turned
      # on, and LeakSanitizer reports Open MPI's own unfreed internal state at
      # MPI_Finalize (component registries, PMIx/hwloc/libevent structures) as
      # leaks. Those allocations belong to Open MPI, not to this project, and
      # nothing here can free them. This is not papering over a real bug: the
      # codebase contains no raw new/malloc/free at all (the ring's temporary
      # receive buffer is a std::vector, so it cannot leak), and test_chunking,
      # which links no MPI, runs clean under ASan/LSan.
      #
      # Everything the sanitizers are actually here to catch stays on:
      # AddressSanitizer's heap-buffer-overflow and use-after-free detection,
      # plus UBSan, remain fully active. Those, not leaks, are the bug class a
      # chunk-offset algorithm risks, and they would still fail this job.
      - name: Run correctness test suite
        env:
          ASAN_OPTIONS: detect_leaks=0
        run: ctest --test-dir build --output-on-failure

  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install analysis dependencies
        run: pip install -r analysis/requirements.txt
      - name: Import-check the analysis pipeline
        run: |
          cd analysis
          python3 -c "import load_results, theoretical_model, generate_plots, generate_tables"

      # The report claims the 1/T-weighted fit recovers alpha and beta where an
      # unweighted fit misses alpha by up to 17%. This proves it on every push
      # rather than leaving it as an assertion: the script recovers known
      # constants from synthesized data (the only kind with a ground truth to
      # recover) and exits nonzero if the weighted fit ever stops working.
      - name: Validate the alpha/beta fitting procedure
        run: python3 analysis/validate_fit.py

      - name: Run the pipeline against the committed sample dataset
        run: python3 analysis/run_full_analysis.py
