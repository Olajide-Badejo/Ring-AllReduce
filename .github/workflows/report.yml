name: Report

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install analysis dependencies
        run: pip install -r analysis/requirements.txt

      - name: Install a TeX distribution
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base texlive-latex-recommended texlive-latex-extra \
            texlive-fonts-recommended texlive-pictures texlive-science latexmk

      - name: Build the report (analyze + compile)
        run: make report

      - name: Upload report/main.pdf
        uses: actions/upload-artifact@v4
        with:
          name: ring-allreduce-report
          path: report/main.pdf
